<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SmartAutomation (Vercel test v2)</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #0b1220;
        color: #e8eefc;
      }
      .wrap {
        max-width: 900px;
        margin: 0 auto;
        padding: 48px 20px;
      }
      .card {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        padding: 28px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 28px;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 0 18px;
        line-height: 1.5;
      }
      code {
        background: rgba(255, 255, 255, 0.08);
        padding: 2px 6px;
        border-radius: 8px;
      }
      .meta {
        display: grid;
        gap: 8px;
        margin-top: 16px;
        font-size: 14px;
        color: rgba(232, 238, 252, 0.85);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>SmartAutomation deployed (v2)</h1>
        <p>Testpagina in `public/` om Vercel-statische deploy zeker te laten slagen.</p>
        <div class="meta" id="meta"></div>
      </div>
    </div>

    <script>
      const now = new Date();
      document.getElementById("meta").innerHTML = `
        <div><strong>URL:</strong> ${window.location.href}</div>
        <div><strong>Tijd (lokale browser):</strong> ${now.toLocaleString()}</div>
        <div><strong>Deploy test versie:</strong> 2</div>
      `;
    </script>
  </body>
</html>
